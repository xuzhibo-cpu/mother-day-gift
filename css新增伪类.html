<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            width: 100px;
            height: 100px;
            border: 1px solid red;
        }
        p:empty{
            background-color: blue;
        }
        input:focus{
            font-size: 200px;
        }
        input:disabled{
            background-color: green;
        }
        input:enabled{
            background-color: red;
        }
        input:checked+span{
            color: palevioletred;
        }
        :root{
            font-size: 200px;
        }
    </style>
</head>
<body>
    <p class="para"></p>
    <p class="para"></p>
    <p class="para">123</p>
    <p class="para"> </p>
    <p>
        <input type="text" placeholder="请输入内容">
        <input type="text" placeholder="请输入内容" disabled>
        <input type="text" placeholder="请输入内容" disabled>
        <input type="text" placeholder="请输入内容">
    </p>
    <p>
        <input type="checkbox"><span>选项1</span>
        <input type="checkbox"><span>选项2</span>
        <input type="checkbox"><span>选项3</span>
        <input type="checkbox"><span>选项4</span>
        <input type="checkbox"><span>选项5</span>
        <input type="checkbox"><span>选项6</span>
        <input type="checkbox"><span>选项7</span>
        <input type="checkbox"><span>选项8</span>
        <input type="checkbox"><span>选项9</span>
    </p>
</body>
</html>
