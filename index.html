<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>妇女节快乐 - 梁丽女士</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FBF6F0;
            --paper: #F5EDE4;
            --warm-gray: #5C5346;
            --accent: #B8956B;
            --accent-soft: #D4B896;
            --poem-accent: #8B7355;
            --ink: #3D3429;
            --gold: #C9A86C;
            --color-1: rgba(232, 196, 208, 0.65);
            --color-2: rgba(232, 216, 184, 0.6);
            --color-3: rgba(200, 220, 200, 0.55);
            --color-4: rgba(212, 204, 232, 0.6);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Noto Serif SC', 'Cormorant Garamond', serif;
            background: #F5EDE8;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            color: var(--warm-gray);
            line-height: 1.7;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            overflow-x: hidden;
        }
        
        /*  四色艺术背景 - 与鼠标交互 */
        .bg-four-color {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        
        .bg-four-color::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 90% 70% at 0% 0%, var(--color-1) 0%, transparent 55%),
                radial-gradient(ellipse 80% 80% at 100% 0%, var(--color-2) 0%, transparent 55%),
                radial-gradient(ellipse 85% 75% at 100% 100%, var(--color-3) 0%, transparent 55%),
                radial-gradient(ellipse 80% 85% at 0% 100%, var(--color-4) 0%, transparent 55%);
            opacity: 1;
            animation: colorBreathe 20s ease-in-out infinite;
        }
        
        @keyframes colorBreathe {
            0%, 100% { filter: saturate(1); opacity: 1; }
            50% { filter: saturate(1.05); opacity: 0.98; }
        }
        
        .bg-four-color::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(
                circle 400px at var(--mouse-x, 50%) var(--mouse-y, 50%),
                rgba(255, 255, 255, 0.3) 0%,
                rgba(255, 250, 245, 0.12) 40%,
                transparent 65%
            );
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .bg-four-color.active::after {
            opacity: 1;
        }
        
        /*  modern floating orbs */
        .bg-particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .bg-particles span {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(212, 184, 150, 0.4), rgba(184, 149, 107, 0.15));
            filter: blur(1px);
            animation: orbFloat 25s ease-in-out infinite;
        }
        
        .bg-particles span:nth-child(1) { left: 5%; top: 15%; width: 120px; height: 120px; animation-delay: 0s; animation-duration: 22s; }
        .bg-particles span:nth-child(2) { left: 70%; top: 70%; width: 180px; height: 180px; animation-delay: -5s; animation-duration: 28s; opacity: 0.8; }
        .bg-particles span:nth-child(3) { left: 40%; top: 5%; width: 100px; height: 100px; animation-delay: -10s; animation-duration: 20s; }
        .bg-particles span:nth-child(4) { left: 85%; top: 30%; width: 80px; height: 80px; animation-delay: -3s; animation-duration: 26s; opacity: 0.7; }
        .bg-particles span:nth-child(5) { left: 15%; top: 60%; width: 150px; height: 150px; animation-delay: -8s; animation-duration: 24s; opacity: 0.6; }
        .bg-particles span:nth-child(6) { left: 60%; top: 85%; width: 90px; height: 90px; animation-delay: -12s; animation-duration: 20s; }
        
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.1); }
            66% { transform: translate(-20px, 25px) scale(0.95); }
        }
        
        /*  mouse-following glow - 置于背景最上层 */
        .mouse-glow {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            background: radial-gradient(
                circle 350px at var(--mouse-x, 50%) var(--mouse-y, 50%),
                rgba(212, 184, 150, 0.45) 0%,
                rgba(184, 149, 107, 0.2) 25%,
                transparent 55%
            );
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        .mouse-glow.active {
            opacity: 1;
        }
        
        /*  WebGL canvas layer */
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            padding-left: max(1.5rem, env(safe-area-inset-left));
            padding-right: max(1.5rem, env(safe-area-inset-right));
        }
        
        .card {
            max-width: 560px;
            width: 100%;
            background: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"),
                linear-gradient(180deg, rgba(255,252,248,0.98) 0%, rgba(250,245,238,0.95) 100%);
            border: 2px double rgba(184, 149, 107, 0.35);
            border-radius: 3px;
            padding: 3.5rem 2.5rem;
            box-shadow: 
                0 1px 1px rgba(184, 149, 107, 0.08),
                0 4px 16px rgba(92, 83, 70, 0.06),
                0 24px 48px -12px rgba(61, 52, 41, 0.12),
                inset 0 1px 0 rgba(255,255,255,0.6);
            position: relative;
            animation: cardEnter 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        
        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 2rem;
            right: 2rem;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-soft), transparent);
            opacity: 0.6;
        }
        
        .card::after {
            content: '';
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(184, 149, 107, 0.12);
            border-radius: 1px;
            pointer-events: none;
        }
        
        .title-container {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.8rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeIn 0.8s ease 0.2s forwards;
        }
        
        .label::before,
        .label::after {
            content: '—';
            margin: 0 0.5em;
            opacity: 0.5;
        }
        
        .name {
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
            font-size: clamp(2.5rem, 7vw, 3.5rem);
            font-weight: 400;
            color: var(--ink);
            letter-spacing: 0.2em;
            opacity: 0;
            animation: nameReveal 1s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards;
        }
        
        @keyframes nameReveal {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .poem {
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
            font-size: 1.5rem;
            text-align: center;
            color: var(--ink);
            margin: 2.5rem 0;
            letter-spacing: 0.08em;
            line-height: 2.2;
            position: relative;
            padding: 0 1rem;
        }
        
        .poem .line {
            display: block;
            opacity: 0;
            animation: poemReveal 1s ease forwards;
        }
        .poem .line:nth-child(1) { animation-delay: 0.5s; }
        .poem .line:nth-child(2) { animation-delay: 0.65s; }
        .poem .line:nth-child(3) { animation-delay: 0.8s; }
        .poem .line:nth-child(4) { animation-delay: 0.95s; }
        .poem .line:nth-child(5) { animation-delay: 1.1s; }
        
        @keyframes poemReveal {
            from { opacity: 0; transform: translateY(8px); letter-spacing: 0.2em; }
            to { opacity: 1; transform: translateY(0); letter-spacing: 0.08em; }
        }
        
        .poem .highlight {
            color: var(--gold);
            font-weight: 600;
        }
        
        .poem .attribution {
            font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
            font-size: 0.9rem;
            font-style: italic;
            color: var(--accent);
            margin-top: 1.25rem;
            letter-spacing: 0.15em;
        }
        
        .poem-divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-soft), transparent);
            margin: 1.5rem auto;
            opacity: 0;
            animation: fadeIn 0.8s ease 1.15s forwards;
        }
        
        .message {
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            color: var(--warm-gray);
            margin: 2rem 0 1.5rem;
            line-height: 1.9;
            opacity: 0;
            animation: fadeIn 0.9s ease 1s forwards;
        }
        
        .signature {
            text-align: right;
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
            font-size: 1.1rem;
            color: var(--ink);
            margin-top: 2rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(184, 149, 107, 0.25);
            opacity: 0;
            animation: fadeIn 0.8s ease 1.2s forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        /*  minimal floral accent - clickable flowers */
        .floral {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2.5rem;
            opacity: 0;
            animation: fadeIn 0.8s ease 1.2s forwards;
        }
        
        .floral .flower {
            cursor: pointer;
            padding: 12px;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: transform 0.3s ease, opacity 0.3s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        .floral .flower:hover,
        .floral .flower:active {
            transform: scale(1.15);
            opacity: 1;
        }
        
        .floral .flower svg {
            width: 36px;
            height: 36px;
            stroke: var(--accent-soft);
            fill: none;
            stroke-width: 1.2;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }
        
        .floral .flower:hover svg {
            opacity: 1;
            stroke: var(--accent);
        }
        
        .seal {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #D4B896, #B8956B);
            border: 2px solid rgba(184, 149, 107, 0.5);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.3), 0 2px 6px rgba(92,83,70,0.2);
            margin: 1.5rem auto 0;
            opacity: 0;
            animation: fadeIn 0.8s ease 1.5s forwards;
        }
        
        /* 妈妈辛苦了 toast */
        .toast-msg {
            position: fixed;
            background: rgba(92, 83, 70, 0.94);
            color: #FDF8F3;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            z-index: 10000;
            pointer-events: none;
            animation: toastIn 0.4s ease forwards;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        
        @media (max-width: 480px) {
            .toast-msg {
                padding: 14px 28px;
                font-size: 1.05rem;
                max-width: calc(100vw - 32px);
            }
        }
        
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        @media (max-width: 600px) {
            .card {
                padding: 2.5rem 1.5rem;
            }
            
            .name {
                letter-spacing: 0.08em;
            }
            
            .poem {
                font-size: 1.05rem;
            }
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 2rem 1.25rem;
                border-radius: 4px;
            }
            
            .card::before {
                left: 1.25rem;
                right: 1.25rem;
            }
            
            .label {
                font-size: 0.8rem;
                letter-spacing: 0.15em;
            }
            
            .name {
                font-size: 2.2rem;
                letter-spacing: 0.12em;
            }
            
            .poem {
                font-size: 1.2rem;
                margin: 1.5rem 0;
                line-height: 2;
            }
            
            .message {
                font-size: 0.95rem;
                margin: 1.5rem 0 1rem;
            }
            
            .signature {
                font-size: 0.9rem;
                margin-top: 1.5rem;
            }
            
            .floral {
                gap: 1.5rem;
                margin-top: 2rem;
            }
            
            .floral .flower svg {
                width: 32px;
                height: 32px;
            }
            
            .mouse-glow {
                background: radial-gradient(
                    circle 220px at var(--mouse-x, 50%) var(--mouse-y, 50%),
                    rgba(212, 184, 150, 0.4) 0%,
                    rgba(184, 149, 107, 0.15) 25%,
                    transparent 55%
                );
            }
            
            .bg-four-color::after {
                background: radial-gradient(
                    circle 280px at var(--mouse-x, 50%) var(--mouse-y, 50%),
                    rgba(255, 255, 255, 0.28) 0%,
                    rgba(255, 250, 245, 0.1) 35%,
                    transparent 60%
                );
            }
            
            .bg-particles span:nth-child(1) { width: 80px; height: 80px; }
            .bg-particles span:nth-child(2) { width: 120px; height: 120px; }
            .bg-particles span:nth-child(3) { width: 70px; height: 70px; }
            .bg-particles span:nth-child(4) { width: 60px; height: 60px; }
            .bg-particles span:nth-child(5) { width: 100px; height: 100px; }
            .bg-particles span:nth-child(6) { width: 65px; height: 65px; }
        }
        
        @media (max-width: 375px) {
            .container { padding: 1rem 1rem; }
            .card { padding: 1.75rem 1rem; }
            .name { font-size: 1.75rem; }
            .poem { font-size: 0.95rem; }
        }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <canvas id="webgl-canvas" aria-hidden="true"></canvas>
    <div class="bg-four-color" id="bg-four-color" aria-hidden="true"></div>
    <div class="bg-particles" aria-hidden="true">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
    </div>
    <div class="mouse-glow" id="mouse-glow" aria-hidden="true"></div>
    <div class="container">
        <div class="card">
            <div class="title-container">
                <div class="label">妇女节快乐</div>
                <div class="name">梁丽</div>
            </div>
            
            <div class="poem">
                <span class="line">哺雏<span class="highlight">梁</span>燕归，</span>
                <span class="line">禾沐<span class="highlight">丽</span>春晖。</span>
                <span class="line">若道<span class="highlight">恩</span>深重，</span>
                <span class="line">应知<span class="highlight">话</span>与谁。</span>
                <span class="line attribution">——《感至恩》</span>
            </div>
            <div class="poem-divider" aria-hidden="true"></div>
            <div class="message">
                亲爱的妈妈梁丽，今天是属于您的节日。感谢您一直以来的付出和关爱，
                您的爱是我生命中最温暖的阳光。愿您永远年轻美丽，健康快乐！
                您是我心中最棒的妈妈，我爱您！
            </div>
            
            <div class="signature">
                爱您的儿子 续智博<br>
                2026年妇女节
            </div>
            
            <div class="floral">
                <div class="flower" title="点击试试" aria-label="点击试试">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="2"/>
                        <path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.64 5.64l2.12 2.12M16.24 16.24l2.12 2.12M5.64 18.36l2.12-2.12M16.24 7.76l2.12-2.12"/>
                    </svg>
                </div>
                <div class="flower" title="点击试试">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                    </svg>
                </div>
                <div class="flower" title="点击试试">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="2"/>
                        <path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.64 5.64l2.12 2.12M16.24 16.24l2.12 2.12M5.64 18.36l2.12-2.12M16.24 7.76l2.12-2.12"/>
                    </svg>
                </div>
            </div>
            <div class="seal" aria-hidden="true"></div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script>
        (function() {
            var scene, camera, renderer, particles;
            var mouseX = 0.5, mouseY = 0.5, targetX = 0.5, targetY = 0.5;
            var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window);
            
            function initWebGL() {
                var canvas = document.getElementById('webgl-canvas');
                if (!canvas) return;
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 5;
                renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: !isMobile });
                var dpr = isMobile ? Math.min(window.devicePixelRatio, 1.5) : Math.min(window.devicePixelRatio, 2);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(dpr);
                
                var geometry = new THREE.BufferGeometry();
                var count = isMobile ? 180 : 400;
                var positions = new Float32Array(count * 3);
                var colors = new Float32Array(count * 3);
                var c1 = new THREE.Color(0xd4b896);
                var c2 = new THREE.Color(0xb8956b);
                
                for (var i = 0; i < count * 3; i += 3) {
                    positions[i] = (Math.random() - 0.5) * 12;
                    positions[i + 1] = (Math.random() - 0.5) * 12;
                    positions[i + 2] = (Math.random() - 0.5) * 8;
                    var t = Math.random();
                    var c = c1.clone().lerp(c2, t);
                    colors[i] = c.r;
                    colors[i + 1] = c.g;
                    colors[i + 2] = c.b;
                }
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                
                var material = new THREE.PointsMaterial({
                    size: 0.04,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.5,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });
                particles = new THREE.Points(geometry, material);
                scene.add(particles);
                
                function animate() {
                    requestAnimationFrame(animate);
                    if (particles) {
                        var mx = (targetX - 0.5) * 0.004;
                        var my = (targetY - 0.5) * 0.004;
                        particles.rotation.y += 0.0008 + mx;
                        particles.rotation.x += 0.0002 + my;
                    }
                    renderer.render(scene, camera);
                }
                animate();
                
                function onResize() {
                    var w = window.innerWidth;
                    var h = window.innerHeight;
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                    renderer.setSize(w, h);
                }
                window.addEventListener('resize', onResize);
                if (window.visualViewport) window.visualViewport.addEventListener('resize', onResize);
            }
            
            function showToast(x, y, text) {
                x = x || window.innerWidth / 2;
                y = y || window.innerHeight / 2;
                var el = document.createElement('div');
                el.className = 'toast-msg';
                el.textContent = text || '妈妈辛苦了';
                document.body.appendChild(el);
                var rect = el.getBoundingClientRect();
                var pad = 16;
                var left = Math.max(pad, Math.min(x - rect.width / 2, window.innerWidth - rect.width - pad));
                var top = Math.max(pad, Math.min(y - 60, window.innerHeight - rect.height - pad));
                el.style.left = left + 'px';
                el.style.top = top + 'px';
                setTimeout(function() {
                    el.style.opacity = '0';
                    el.style.transform = 'translateY(-8px)';
                    el.style.transition = 'opacity 0.3s, transform 0.3s';
                    setTimeout(function() { el.remove(); }, 300);
                }, 2500);
            }
            
            function initMouseInteraction() {
                var glow = document.getElementById('mouse-glow');
                var bgFour = document.getElementById('bg-four-color');
                var smoothX = 0.5, smoothY = 0.5;
                var isMoving = false;
                var hideTimer = 0;
                
                function updateTarget(clientX, clientY) {
                    targetX = clientX / window.innerWidth;
                    targetY = clientY / window.innerHeight;
                    if (!isMoving) {
                        isMoving = true;
                        if (glow) glow.classList.add('active');
                        if (bgFour) bgFour.classList.add('active');
                    }
                    clearTimeout(hideTimer);
                    hideTimer = setTimeout(function() {
                        isMoving = false;
                        if (glow) glow.classList.remove('active');
                        if (bgFour) bgFour.classList.remove('active');
                    }, 3000);
                }
                
                document.addEventListener('mousemove', function(e) { updateTarget(e.clientX, e.clientY); });
                document.addEventListener('touchstart', function(e) {
                    if (e.touches[0]) updateTarget(e.touches[0].clientX, e.touches[0].clientY);
                }, { passive: true });
                document.addEventListener('touchmove', function(e) {
                    if (e.touches[0]) updateTarget(e.touches[0].clientX, e.touches[0].clientY);
                }, { passive: true });
                
                (function tick() {
                    smoothX += (targetX - smoothX) * 0.06;
                    smoothY += (targetY - smoothY) * 0.06;
                    var mx = (smoothX * 100) + '%';
                    var my = (smoothY * 100) + '%';
                    document.documentElement.style.setProperty('--mouse-x', mx);
                    document.documentElement.style.setProperty('--mouse-y', my);
                    if (glow) {
                        glow.style.setProperty('--mouse-x', mx);
                        glow.style.setProperty('--mouse-y', my);
                    }
                    var orbLayer = document.querySelector('.bg-particles');
                    if (orbLayer) {
                        var k = isMobile ? 18 : 28;
                        var dx = (smoothX - 0.5) * k;
                        var dy = (smoothY - 0.5) * k;
                        orbLayer.style.transform = 'translate(' + dx + 'px, ' + dy + 'px)';
                    }
                    var r = document.documentElement;
                    var d1 = 1 - Math.hypot(smoothX, smoothY) * 1.2;
                    var d2 = 1 - Math.hypot(1 - smoothX, smoothY) * 1.2;
                    var d3 = 1 - Math.hypot(1 - smoothX, 1 - smoothY) * 1.2;
                    var d4 = 1 - Math.hypot(smoothX, 1 - smoothY) * 1.2;
                    r.style.setProperty('--color-1', 'rgba(232,196,208,' + (0.4 + Math.max(0, d1) * 0.4) + ')');
                    r.style.setProperty('--color-2', 'rgba(232,216,184,' + (0.4 + Math.max(0, d2) * 0.4) + ')');
                    r.style.setProperty('--color-3', 'rgba(200,220,200,' + (0.35 + Math.max(0, d3) * 0.4) + ')');
                    r.style.setProperty('--color-4', 'rgba(212,204,232,' + (0.4 + Math.max(0, d4) * 0.4) + ')');
                    requestAnimationFrame(tick);
                })();
            }
            
            document.addEventListener('DOMContentLoaded', function() {
                try { initWebGL(); } catch (e) { console.warn('WebGL init failed', e); }
                initMouseInteraction();
                var lastToastTime = 0;
                function handleFlowerTap(clientX, clientY) {
                    if (Date.now() - lastToastTime < 400) return;
                    lastToastTime = Date.now();
                    showToast(clientX, clientY);
                }
                document.querySelectorAll('.flower').forEach(function(flower) {
                    flower.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var x = e.clientX != null ? e.clientX : (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientX : window.innerWidth / 2);
                        var y = e.clientY != null ? e.clientY : (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientY : window.innerHeight / 2);
                        handleFlowerTap(x, y);
                    });
                    flower.addEventListener('touchend', function(e) {
                        var t = e.changedTouches && e.changedTouches[0];
                        if (t) { e.preventDefault(); handleFlowerTap(t.clientX, t.clientY); }
                    }, { passive: false });
                });
            });
        })();
    </script>
</body>
</html>
