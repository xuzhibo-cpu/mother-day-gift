<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>妇女节快乐 - 梁丽女士</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FBF6F0;
            --paper: #F5EDE4;
            --warm-gray: #5C5346;
            --accent: #B8956B;
            --accent-soft: #D4B896;
            --poem-accent: #8B7355;
            --ink: #3D3429;
            --gold: #C9A86C;
            --bg-accent: #B8956B;
            --bg-accent-soft: #E8D8D4;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Noto Serif SC', 'Cormorant Garamond', serif;
            background: #F5EDE4;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            color: var(--warm-gray);
            line-height: 1.7;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            overflow-x: hidden;
        }
        
        /*  母亲节主题 - 点击切换色块背景（无模糊） */
        .bg-slides {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            cursor: pointer;
        }
        
        .bg-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transform: scale(1.02);
            transition: opacity 0.6s ease, transform 0.8s ease;
            pointer-events: none;
            display: flex;
            flex-wrap: wrap;
        }
        
        .bg-slide.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        
        .bg-block {
            position: absolute;
            border-radius: 0;
            transform: translate3d(0, 18px, 0);
            transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .bg-slide.active .bg-block {
            transform: translate3d(0, 0, 0);
        }

        .bg-slide .bg-block:nth-child(2) {
            transition-delay: 40ms;
        }

        .bg-slide .bg-block:nth-child(3) {
            transition-delay: 80ms;
        }

        .bg-slide .bg-block:nth-child(4) {
            transition-delay: 120ms;
        }
        
        /*  slide 1: 柔粉 + 米色 */
        .bg-slide[data-slide="1"] .bg-block:nth-child(1) {
            top: 0; left: 0;
            width: 60%; height: 45%;
            background: #F8E8EC;
        }
        .bg-slide[data-slide="1"] .bg-block:nth-child(2) {
            top: 0; right: 0;
            width: 45%; height: 55%;
            background: #F5EDE4;
        }
        .bg-slide[data-slide="1"] .bg-block:nth-child(3) {
            bottom: 0; left: 0;
            width: 50%; height: 50%;
            background: #F0E4DC;
        }
        .bg-slide[data-slide="1"] .bg-block:nth-child(4) {
            bottom: 0; right: 0;
            width: 55%; height: 48%;
            background: #E8D8D4;
        }
        
        /*  slide 2: 暖杏 + 玫瑰 */
        .bg-slide[data-slide="2"] .bg-block:nth-child(1) {
            top: 0; right: 0;
            width: 70%; height: 40%;
            background: #F5E6E0;
        }
        .bg-slide[data-slide="2"] .bg-block:nth-child(2) {
            top: 40%; left: 0;
            width: 40%; height: 60%;
            background: #F2E4E8;
        }
        .bg-slide[data-slide="2"] .bg-block:nth-child(3) {
            bottom: 0; right: 0;
            width: 65%; height: 45%;
            background: #EDE0E4;
        }
        
        /*  slide 3: 奶油 + 淡金 */
        .bg-slide[data-slide="3"] .bg-block:nth-child(1) {
            top: 0; left: 0;
            width: 100%; height: 35%;
            background: #FAF0E8;
        }
        .bg-slide[data-slide="3"] .bg-block:nth-child(2) {
            top: 35%; left: 0;
            width: 35%; height: 65%;
            background: #F5EDE4;
        }
        .bg-slide[data-slide="3"] .bg-block:nth-child(3) {
            top: 35%; right: 0;
            width: 70%; height: 65%;
            background: #F8ECE0;
        }
        
        /*  slide 4: 淡紫粉 + 暖灰 */
        .bg-slide[data-slide="4"] .bg-block:nth-child(1) {
            top: 0; left: 0;
            width: 50%; height: 60%;
            background: #F0E8EC;
        }
        .bg-slide[data-slide="4"] .bg-block:nth-child(2) {
            top: 0; right: 0;
            width: 55%; height: 50%;
            background: #EDE4E8;
        }
        .bg-slide[data-slide="4"] .bg-block:nth-child(3) {
            bottom: 0; left: 25%;
            width: 55%; height: 55%;
            background: #E8E0E4;
        }
        
        .bg-click-hint {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bg-hint-text {
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            color: color-mix(in srgb, var(--bg-accent) 70%, #6f6251 30%);
            background: rgba(255, 250, 244, 0.65);
            border: 1px solid rgba(184, 149, 107, 0.2);
            border-radius: 999px;
            padding: 0.2rem 0.55rem;
        }
        
        .bg-click-hint .bg-dot {
            cursor: pointer;
            pointer-events: auto;
        }
        
        .bg-dot {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: transparent;
            transition: all 0.3s ease;
            position: relative;
        }

        .bg-dot::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(184, 149, 107, 0.4);
            transition: all 0.3s ease;
        }
        
        .bg-dot.active {
            transform: scale(1.05);
        }

        .bg-dot.active::before {
            background: var(--bg-accent);
            transform: scale(1.2);
        }

        .bg-dot:focus-visible,
        .flower:focus-visible,
        .memory-btn:focus-visible {
            outline: 2px solid var(--bg-accent);
            outline-offset: 2px;
        }
        
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            pointer-events: none;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            padding-left: max(1.5rem, env(safe-area-inset-left));
            padding-right: max(1.5rem, env(safe-area-inset-right));
        }
        
        .card {
            pointer-events: auto;
            max-width: 560px;
            width: 100%;
            background: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"),
                linear-gradient(180deg, rgba(255,252,248,0.98) 0%, rgba(250,245,238,0.95) 100%);
            border: 2px double color-mix(in srgb, var(--bg-accent) 42%, #ffffff 58%);
            border-radius: 3px;
            padding: 3.5rem 2.5rem;
            box-shadow: 
                0 1px 1px rgba(184, 149, 107, 0.08),
                0 4px 16px rgba(92, 83, 70, 0.06),
                0 24px 48px -12px rgba(61, 52, 41, 0.12),
                inset 0 1px 0 rgba(255,255,255,0.6);
            position: relative;
            animation: cardEnter 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }
        
        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 2rem;
            right: 2rem;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--bg-accent-soft), transparent);
            opacity: 0.6;
        }
        
        .card::after {
            content: '';
            position: absolute;
            inset: 12px;
            border: 1px solid color-mix(in srgb, var(--bg-accent) 20%, #ffffff 80%);
            border-radius: 1px;
            pointer-events: none;
        }
        
        .title-container {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.8rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeIn 0.8s ease 0.2s forwards;
        }
        
        .label::before,
        .label::after {
            content: '—';
            margin: 0 0.5em;
            opacity: 0.5;
        }
        
        .name {
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
            font-size: clamp(2.5rem, 7vw, 3.5rem);
            font-weight: 400;
            color: var(--ink);
            letter-spacing: 0.2em;
            opacity: 0;
            animation: nameReveal 1s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards;
        }
        
        @keyframes nameReveal {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .poem {
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
            font-size: 1.5rem;
            text-align: center;
            color: var(--ink);
            margin: 2.5rem 0;
            letter-spacing: 0.08em;
            line-height: 2.2;
            position: relative;
            padding: 0 1rem;
        }
        
        .poem .line {
            display: block;
            opacity: 0;
            animation: poemReveal 1s ease forwards;
        }
        .poem .line:nth-child(1) { animation-delay: 0.5s; }
        .poem .line:nth-child(2) { animation-delay: 0.65s; }
        .poem .line:nth-child(3) { animation-delay: 0.8s; }
        .poem .line:nth-child(4) { animation-delay: 0.95s; }
        .poem .line:nth-child(5) { animation-delay: 1.1s; }
        
        @keyframes poemReveal {
            from { opacity: 0; transform: translateY(8px); letter-spacing: 0.2em; }
            to { opacity: 1; transform: translateY(0); letter-spacing: 0.08em; }
        }
        
        .poem .highlight {
            color: var(--gold);
            font-weight: 600;
        }
        
        .poem .attribution {
            font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
            font-size: 0.9rem;
            font-style: italic;
            color: var(--accent);
            margin-top: 1.25rem;
            letter-spacing: 0.15em;
        }
        
        .poem-divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-soft), transparent);
            margin: 1.5rem auto;
            opacity: 0;
            animation: fadeIn 0.8s ease 1.15s forwards;
        }
        
        .message {
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            color: var(--warm-gray);
            margin: 2rem 0 1.5rem;
            line-height: 1.9;
            opacity: 0;
            animation: fadeIn 0.9s ease 1s forwards;
        }

        .message p + p {
            margin-top: 0.65rem;
        }
        
        .signature {
            text-align: right;
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
            font-size: 1.1rem;
            color: var(--ink);
            margin-top: 2rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(184, 149, 107, 0.25);
            opacity: 0;
            animation: fadeIn 0.8s ease 1.2s forwards;
        }

        .memory-btn {
            margin-top: 1rem;
            padding: 0.55rem 1rem;
            border: 1px solid color-mix(in srgb, var(--bg-accent) 45%, #ffffff 55%);
            background: color-mix(in srgb, var(--bg-accent-soft) 35%, #ffffff 65%);
            color: var(--ink);
            border-radius: 999px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .memory-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(92, 83, 70, 0.12);
        }

        .memory-dialog {
            position: fixed;
            inset: 0;
            background: rgba(40, 34, 28, 0.35);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 30;
            padding: 1rem;
        }

        .memory-dialog.open {
            display: flex;
        }

        .memory-panel {
            width: min(420px, 94vw);
            background: #fffaf5;
            border: 1px solid rgba(184, 149, 107, 0.3);
            border-radius: 10px;
            padding: 1rem 1rem 0.9rem;
        }

        .memory-panel p {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--ink);
        }

        .memory-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 0.8rem;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        /*  minimal floral accent - clickable flowers */
        .floral {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2.5rem;
            opacity: 0;
            animation: fadeIn 0.8s ease 1.2s forwards;
        }
        
        .floral .flower {
            cursor: pointer;
            padding: 12px;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: transform 0.3s ease, opacity 0.3s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        .floral .flower:hover,
        .floral .flower:active {
            transform: scale(1.15);
            opacity: 1;
        }
        
        .floral .flower svg {
            width: 36px;
            height: 36px;
            stroke: var(--accent-soft);
            fill: none;
            stroke-width: 1.2;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }
        
        .floral .flower:hover svg {
            opacity: 1;
            stroke: var(--accent);
        }
        
        .seal {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #D4B896, #B8956B);
            border: 2px solid rgba(184, 149, 107, 0.5);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.3), 0 2px 6px rgba(92,83,70,0.2);
            margin: 1.5rem auto 0;
            opacity: 0;
            animation: fadeIn 0.8s ease 1.5s forwards;
        }
        
        /* 妈妈辛苦了 toast */
        .toast-msg {
            position: fixed;
            background: rgba(92, 83, 70, 0.94);
            color: #FDF8F3;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            z-index: 10000;
            pointer-events: none;
            animation: toastIn 0.4s ease forwards;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        
        @media (max-width: 480px) {
            .toast-msg {
                padding: 14px 28px;
                font-size: 1.05rem;
                max-width: calc(100vw - 32px);
            }
        }
        
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        /*  手机端：让背景色显示更多，与中间卡片做平衡 */
        @media (max-width: 768px) {
            .container {
                padding: 2rem 1rem;
            }
            .card {
                max-width: 88%;
                padding: 2.5rem 1.5rem;
            }
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 2.5rem 1rem;
            }
            .card {
                max-width: 90%;
                padding: 2.5rem 1.5rem;
            }
            
            .name {
                letter-spacing: 0.08em;
            }
            
            .poem {
                font-size: 1.05rem;
            }
            
            .bg-click-hint {
                bottom: 1rem;
            }

            .bg-hint-text {
                font-size: 0.72rem;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 1.75rem 0.75rem;
            }
            .card {
                max-width: 92%;
                padding: 2rem 1.25rem;
                border-radius: 4px;
            }
            
            .card::before {
                left: 1.25rem;
                right: 1.25rem;
            }
            
            .label {
                font-size: 0.8rem;
                letter-spacing: 0.15em;
            }
            
            .name {
                font-size: 2.2rem;
                letter-spacing: 0.12em;
            }
            
            .poem {
                font-size: 1.2rem;
                margin: 1.5rem 0;
                line-height: 2;
            }
            
            .message {
                font-size: 0.95rem;
                margin: 1.5rem 0 1rem;
            }
            
            .signature {
                font-size: 1.02rem;
                margin-top: 1.5rem;
            }
            
            .floral {
                gap: 1.5rem;
                margin-top: 2rem;
            }
            
            .floral .flower svg {
                width: 32px;
                height: 32px;
            }
            
        }
        
        @media (max-width: 375px) {
            .container {
                padding: 1.5rem 0.75rem;
            }
            .card {
                max-width: 94%;
                padding: 1.75rem 1rem;
            }
            .name { font-size: 1.75rem; }
            .poem { font-size: 0.95rem; }
            .bg-click-hint {
                bottom: 0.75rem;
            }
        }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-slides" id="bg-slides" aria-hidden="true">
        <div class="bg-slide active" data-slide="1">
            <div class="bg-block"></div><div class="bg-block"></div>
            <div class="bg-block"></div><div class="bg-block"></div>
        </div>
        <div class="bg-slide" data-slide="2">
            <div class="bg-block"></div><div class="bg-block"></div><div class="bg-block"></div>
        </div>
        <div class="bg-slide" data-slide="3">
            <div class="bg-block"></div><div class="bg-block"></div><div class="bg-block"></div>
        </div>
        <div class="bg-slide" data-slide="4">
            <div class="bg-block"></div><div class="bg-block"></div><div class="bg-block"></div>
        </div>
    </div>
    <div class="bg-click-hint" role="group" aria-label="背景切换按钮组">
        <span class="bg-hint-text">点击背景切换</span>
        <span class="bg-dot active" data-dot="0" role="button" tabindex="0" aria-label="切换背景1"></span>
        <span class="bg-dot" data-dot="1" role="button" tabindex="0" aria-label="切换背景2"></span>
        <span class="bg-dot" data-dot="2" role="button" tabindex="0" aria-label="切换背景3"></span>
        <span class="bg-dot" data-dot="3" role="button" tabindex="0" aria-label="切换背景4"></span>
    </div>
    <div class="container">
        <div class="card">
            <div class="title-container">
                <div class="label">妇女节快乐</div>
                <div class="label">致梁丽女士</div>
                <div class="name">梁丽</div>
            </div>
            
            <div class="poem">
                <span class="line">哺雏<span class="highlight">梁</span>燕归，</span>
                <span class="line">禾沐<span class="highlight">丽</span>春晖。</span>
                <span class="line">若道<span class="highlight">恩</span>深重，</span>
                <span class="line">应知<span class="highlight">话</span>与谁。</span>
                <span class="line attribution">——《感至恩》</span>
            </div>
            <div class="poem-divider" aria-hidden="true"></div>
            <div class="message">
                <p>亲爱的妈妈梁丽，今天是属于您的节日。</p>
                <p>感谢您一直以来的付出和关爱，您的爱是我生命中最温暖的阳光。</p>
                <p>愿您永远年轻美丽，健康快乐，平安顺遂。我爱您。</p>
            </div>
            
            <div class="signature">
                爱您的儿子 续智博<br>
                2026年妇女节
            </div>
            <button class="memory-btn" id="memoryBtn" type="button" aria-label="打开给妈妈的话">
                给妈妈的话
            </button>
            
            <div class="floral">
                <div class="flower" title="点击试试" aria-label="点击试试" tabindex="0" role="button">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="2"/>
                        <path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.64 5.64l2.12 2.12M16.24 16.24l2.12 2.12M5.64 18.36l2.12-2.12M16.24 7.76l2.12-2.12"/>
                    </svg>
                </div>
                <div class="flower" title="点击试试" aria-label="点击试试" tabindex="0" role="button">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                    </svg>
                </div>
                <div class="flower" title="点击试试" aria-label="点击试试" tabindex="0" role="button">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="2"/>
                        <path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.64 5.64l2.12 2.12M16.24 16.24l2.12 2.12M5.64 18.36l2.12-2.12M16.24 7.76l2.12-2.12"/>
                    </svg>
                </div>
            </div>
            <div class="seal" aria-hidden="true"></div>
        </div>
    </div>
    <div class="memory-dialog" id="memoryDialog" role="dialog" aria-modal="true" aria-label="给妈妈的话">
        <div class="memory-panel">
            <p>妈妈，感谢您一直把我放在心上。未来我会更努力，把更多温柔和安心带回家。</p>
            <div class="memory-actions">
                <button class="memory-btn" id="memoryCloseBtn" type="button">我知道啦</button>
            </div>
        </div>
    </div>
    
    <script>
        (function() {
            function showToast(x, y, text) {
                x = x || window.innerWidth / 2;
                y = y || window.innerHeight / 2;
                var el = document.createElement('div');
                el.className = 'toast-msg';
                el.textContent = text || '妈妈辛苦了';
                document.body.appendChild(el);
                var rect = el.getBoundingClientRect();
                var pad = 16;
                var left = Math.max(pad, Math.min(x - rect.width / 2, window.innerWidth - rect.width - pad));
                var top = Math.max(pad, Math.min(y - 60, window.innerHeight - rect.height - pad));
                el.style.left = left + 'px';
                el.style.top = top + 'px';
                setTimeout(function() {
                    el.style.opacity = '0';
                    el.style.transform = 'translateY(-8px)';
                    el.style.transition = 'opacity 0.3s, transform 0.3s';
                    setTimeout(function() { el.remove(); }, 300);
                }, 2500);
            }
            
            function initBgSlides() {
                var slides = document.querySelectorAll('.bg-slide');
                var dots = document.querySelectorAll('.bg-dot');
                var container = document.getElementById('bg-slides');
                var current = 0;
                var autoTimer = null;
                var pauseTimer = null;
                var palettes = [
                    { accent: '#C3967F', soft: '#E8D8D4' },
                    { accent: '#B98692', soft: '#EDE0E4' },
                    { accent: '#C6A273', soft: '#F8ECE0' },
                    { accent: '#A58FA8', soft: '#E8E0E4' }
                ];
                
                function applyPalette(index) {
                    var palette = palettes[index] || palettes[0];
                    document.documentElement.style.setProperty('--bg-accent', palette.accent);
                    document.documentElement.style.setProperty('--bg-accent-soft', palette.soft);
                }
                
                function goTo(i) {
                    current = (i + 4) % 4;
                    slides.forEach(function(s, idx) {
                        s.classList.toggle('active', idx === current);
                    });
                    dots.forEach(function(d, idx) {
                        d.classList.toggle('active', idx === current);
                        d.setAttribute('aria-pressed', idx === current ? 'true' : 'false');
                    });
                    applyPalette(current);
                }

                function startAuto() {
                    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
                    if (autoTimer) clearInterval(autoTimer);
                    autoTimer = setInterval(function() {
                        goTo(current + 1);
                    }, 7000);
                }

                function pauseAutoTemporarily() {
                    if (autoTimer) clearInterval(autoTimer);
                    if (pauseTimer) clearTimeout(pauseTimer);
                    pauseTimer = setTimeout(function() {
                        startAuto();
                    }, 12000);
                }
                
                if (container) {
                    container.addEventListener('click', function(e) {
                        if (e.target.closest('.card') || e.target.closest('.bg-click-hint')) return;
                        goTo(current + 1);
                        pauseAutoTemporarily();
                    });
                }
                
                dots.forEach(function(dot, i) {
                    dot.addEventListener('click', function(e) {
                        e.stopPropagation();
                        goTo(i);
                        pauseAutoTemporarily();
                    });
                    dot.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            goTo(i);
                            pauseAutoTemporarily();
                        }
                    });
                });

                goTo(0);
                startAuto();
            }

            function initMemoryDialog() {
                var openBtn = document.getElementById('memoryBtn');
                var closeBtn = document.getElementById('memoryCloseBtn');
                var dialog = document.getElementById('memoryDialog');
                if (!openBtn || !closeBtn || !dialog) return;

                function openDialog() {
                    dialog.classList.add('open');
                    closeBtn.focus();
                }

                function closeDialog() {
                    dialog.classList.remove('open');
                    openBtn.focus();
                }

                openBtn.addEventListener('click', openDialog);
                closeBtn.addEventListener('click', closeDialog);
                dialog.addEventListener('click', function(e) {
                    if (e.target === dialog) closeDialog();
                });
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape' && dialog.classList.contains('open')) closeDialog();
                });
            }
            
            document.addEventListener('DOMContentLoaded', function() {
                initBgSlides();
                var lastToastTime = 0;
                function handleFlowerTap(clientX, clientY) {
                    if (Date.now() - lastToastTime < 400) return;
                    lastToastTime = Date.now();
                    showToast(clientX, clientY);
                }
                document.querySelectorAll('.flower').forEach(function(flower) {
                    flower.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var x = e.clientX != null ? e.clientX : (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientX : window.innerWidth / 2);
                        var y = e.clientY != null ? e.clientY : (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientY : window.innerHeight / 2);
                        handleFlowerTap(x, y);
                    });
                    flower.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            handleFlowerTap(window.innerWidth / 2, window.innerHeight / 2);
                        }
                    });
                    flower.addEventListener('touchend', function(e) {
                        var t = e.changedTouches && e.changedTouches[0];
                        if (t) { e.preventDefault(); handleFlowerTap(t.clientX, t.clientY); }
                    }, { passive: false });
                });
                initMemoryDialog();
            });
        })();
    </script>
</body>
</html>
